    // Yadda≈üdan baxΡ±lmΡ±≈ü m…ôs…ôl…ôl…ôrin siyahΡ±sΡ±nΡ± gΟΕtΟΦrΟΦrΟΦk (Massiv olaraq)
    let visitedProblems = JSON.parse(localStorage.getItem('visitedProblems')) || [];

    // Karta klikl…ôy…ônd…ô i≈ü…ô dΟΦ≈ü…ôn funksiya
    function markAsVisited(id, element) {
        if (!visitedProblems.includes(id)) {
            visitedProblems.push(id);
            localStorage.setItem('visitedProblems', JSON.stringify(visitedProblems));
            element.classList.add('visited'); // KartΡ±n r…ôngini anΡ±nda d…ôyi≈üirik
        }
    }

    function renderApp() {
        const root = document.getElementById('app-root');
        root.innerHTML = ''; 

        const groupedProblems = {};
        problemsModel.forEach(prob => {
            if (!groupedProblems[prob.category]) {
                groupedProblems[prob.category] = [];
            }
            groupedProblems[prob.category].push(prob);
        });

        Object.keys(groupedProblems).forEach(categoryName => {
            const problems = groupedProblems[categoryName];
            problems.sort((a, b) => a.id - b.id);

            const section = document.createElement('div');
            section.className = 'category-section';

            const titleDiv = document.createElement('div');
            titleDiv.className = 'category-title';
            titleDiv.innerHTML = `
                <span>${categoryName}</span>
                <span class="badge">${problems.length} m…ôs…ôl…ô</span>
            `;
            section.appendChild(titleDiv);

            const grid = document.createElement('div');
            grid.className = 'problem-grid';

            problems.forEach(prob => {
                const card = document.createElement('a');
                
                // 3. Τèg…ôr m…ôs…ôl…ô ID-si yadda≈üda varsa, "visited" klassΡ± …ôlav…ô edilir
                const isVisited = visitedProblems.includes(prob.id);
                card.className = `problem-card ${isVisited ? 'visited' : ''}`;
                
                card.href = `https://eolymp.com/az/problems/${prob.id}`;
                card.target = '_blank';
                
                // Klik hadis…ôsini dinl…ôyirik
                card.onclick = function() { markAsVisited(prob.id, card); };

                card.innerHTML = `
                    <div class="problem-id">#${prob.id}</div>
                    <div class="problem-title" title="${prob.title}">${prob.title}</div>
                `;
                grid.appendChild(card);
            });

            section.appendChild(grid);
            root.appendChild(section);
        });
    }

    document.addEventListener('DOMContentLoaded', renderApp);
</script>
